<title>Butterfly retrace — test bench</title>
<style>
  :root{ --gold:#B8923E; }
  *{margin:0; padding:0; box-sizing:border-box}
  body{
    min-height:100vh; background:#FBF7EF; font-family:Georgia,serif; color:#6B5E4E;
    display:flex; flex-direction:column; align-items:center; gap:18px; padding:28px 16px 48px;
  }
  h1{font-size:15px; font-weight:normal; letter-spacing:.18em; text-transform:uppercase; color:#9c763b}
  .stage{font-size:13px; letter-spacing:.08em; color:#8A7B66}
  .compare{display:flex; flex-wrap:wrap; gap:26px; justify-content:center; align-items:flex-start}
  .panel{display:flex; flex-direction:column; align-items:center; gap:8px}
  .panel span{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#8A7B66}
  .art{width:min(70vw,500px); aspect-ratio:1; display:block}
  img.art{object-fit:contain}
  button{
    font-family:inherit; font-size:14px; letter-spacing:.1em; color:#FBF7EF; background:#7A2E2E;
    border:0; border-radius:8px; padding:12px 30px; cursor:pointer;
  }

  /* butterfly linework */
  #bfly path{
    stroke:var(--gold); fill:none;
    stroke-linecap:round; stroke-linejoin:round;
    stroke-dasharray:1; stroke-dashoffset:1; /* hidden until drawn on */
  }
  #bfly .w14{stroke-width:1.4}
  #bfly .w9{stroke-width:.9}

  /* stage 4 · draw-on: gold ink drawing itself, staggered by --o per group
     order: body(0) -> fw outline(1) -> hw outline(2) -> venation(3) -> cells/scallops(4) -> eyespots/filigree(5) */
  #bfly.play path{
    animation:draw .9s cubic-bezier(.33,1,.68,1) forwards;
    animation-delay:calc(var(--o,0) * .22s);
  }
  @keyframes draw{to{stroke-dashoffset:0}}
  @media (prefers-reduced-motion: reduce){
    #bfly path{stroke-dashoffset:0 !important; animation:none !important}
  }
</style>
</head>

  <button id="replay" type="button">Replay draw-on</button>

<script>
  // mirror the authored right half into the left group (real nodes, so CSS + animations apply)
  document.getElementById('halfL').innerHTML = document.getElementById('halfR').innerHTML;

  // draw on at load (reduced-motion users see it fully drawn via the media query)
  requestAnimationFrame(function(){ document.getElementById('bfly').classList.add('play'); });

  // wired now; re-triggers the stage-4 draw-on animation once it exists
  document.getElementById('replay').addEventListener('click', function(){
    var svg = document.getElementById('bfly');
    svg.classList.remove('play');
    void svg.getBoundingClientRect(); // reflow so animations restart
    svg.classList.add('play');
  });
</script>
